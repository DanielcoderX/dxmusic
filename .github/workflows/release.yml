name: Build & Release Android APKs

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag Name (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_title:
        description: 'Release Title'
        required: true
        default: 'DXMusic v1.0.0 Release'
      release_notes:
        description: 'Release Description / Notes'
        required: false
        default: 'Automatic production release of DXMusic.'

jobs:
  build:
    name: Build and Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.9.2'
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APKs (Per-ABI & Universal)
        run: flutter build apk --release --split-per-abi

      - name: Create GitHub Release and Upload APKs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: ${{ github.event.inputs.release_title }}
          body: ${{ github.event.inputs.release_notes }}
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
            build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
