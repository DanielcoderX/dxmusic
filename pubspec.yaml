name: dxmusic
description: "Premium liquid glassmorphic music player for Android featuring dynamic ambient mesh background effects."
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  on_audio_query: ^2.9.0
  flutter_bloc: ^9.1.1
  just_audio: ^0.10.5
  flutter_feather_icons: ^2.0.0+1
  animations: ^2.2.0
  audio_service: ^0.18.18
  audio_session: ^0.2.3
  marquee: ^2.3.0
  palette_generator: ^0.3.3+7
  webview_flutter: ^4.13.1
  dio: ^5.9.2
  path_provider: ^2.1.5
  soundcloud_explode_dart: ^1.1.0
  audiotags: ^1.4.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4

flutter:

  uses-material-design: true

  assets:
    - assets/images/default_album.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png" # Make sure your logo is placed here!
  adaptive_icon_background: "#0A0A0C"  # Matches your dark premium app theme background
  adaptive_icon_foreground: "assets/images/logo.png"